<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대한민국 법제처 법령정보센터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .accordion-content { transition: max-height 0.3s ease-out; overflow: hidden; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <header class="bg-gray-800 border-b border-gray-700 sticky top-0 z-50 shadow-md">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <span class="text-2xl">🏛️</span>
                <div>
                    <h1 class="text-lg font-bold tracking-wide text-white">법제처 법령정보센터</h1>
                    <p class="text-xs text-gray-400">대한민국 및 자매결연 도시 법령 통합 포털</p>
                </div>
            </div>
            <span class="bg-blue-600 text-xs px-2.5 py-1 rounded-full font-semibold text-white">🔒 보안운영 모드</span>
        </div>
    </header>

    <div class="bg-red-900/40 border-b border-red-700 text-red-200 text-xs py-2 px-4 text-center font-medium">
        ⚠️ 모든 자치도시의 개별 법령은 대한민국의 최상위 규범(헌법/정관)을 위반할 수 없습니다. [국가법 우위 원칙]
    </div>

    <main class="max-w-4xl mx-auto px-4 py-6">
        <section class="mb-6">
            <h2 class="text-sm font-semibold text-gray-400 mb-3 uppercase tracking-wider">소속 지역 선택</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-2" id="tab-container"></div>
        </section>

        <section class="bg-gray-800/50 border border-gray-700 rounded-xl p-4 mb-6">
            <h3 class="text-base font-bold text-blue-400" id="city-title">지역을 선택해 주세요</h3>
            <p class="text-sm text-gray-400 mt-1" id="city-desc">-</p>
        </section>

        <section>
            <h2 class="text-sm font-semibold text-gray-400 mb-3 uppercase tracking-wider">해당 지역 법령 목차</h2>
            <div class="space-y-3" id="laws-container"></div>
        </section>
    </main>

    <script>
        // 📝 법령 데이터를 이 자리에 통합했습니다. 나중에 법을 고치려면 여기 텍스트만 수정하세요!
        const lawData = {
          "hq": {
            "name": "대한민국 본부",
            "desc": "대한민국 서버 전체에 적용되는 최상위 규정 및 표준 법령입니다.",
            "laws": [
              { "title": "📜 서버규정", "subtitle": "최상위 규정 (본부 전용)", "content": "<p><b>제1조 (목적)</b> 본 규정은 대한민국(Roblox) 커뮤니티의 질서 유지를 목적으로 한다.</p><p><b>제2조 (금지사항)</b> 서버를 테러하거나 운영을 방해하는 행위는 즉각 처러된다.</p>" },
              { "title": "🏛️ 행정총회정관", "subtitle": "서버규정 하위 규정 (행정총회 전용)", "content": "<p><b>제1조 (목적)</b> 행정총회의 조직 구성과 직무 범위를 규정한다.</p><p><b>제2조 (권한의 한계)</b> 행정총회는 직접적인 관리 권한을 행사할 수 없다.</p>" },
              { "title": "🛠️ 운영명령", "subtitle": "서버규정 보충 명령 (본부 전용)", "content": "<p><b>제1호</b> 홀더의 명령 권한으로 정관에서 위임한 세부 사항을 보충한다.</p>" },
              { "title": "⚖️ 표준국가법령 (RP)", "subtitle": "공통 실무법", "content": "<p><b>[형법] 제1조</b> 타인의 재물을 손괴한 자는 처벌한다.</p><p><b>[도로교통법] 제1조</b> 무면허 운전을 금지한다.</p>" }
            ]
          },
          "seoul": {
            "name": "서울특별시 (직영)",
            "desc": "본부 직영 지자체로, 표준국가법령을 따르며 자체 규정을 적용합니다.",
            "laws": [
              { "title": "📜 서울시 자체 서버규정", "subtitle": "지자체 자체 규정", "content": "<p><b>제1조</b> 서울특별시의 내부 질서와 유저 관리를 위한 전용 규정이다.</p>" },
              { "title": "🛠️ 서울시 자체 운영명령", "subtitle": "시장령 / 자체 명령", "content": "<p><b>제1호</b> 서울시장이 발령하는 행정 보충 명령이다.</p>" },
              { "title": "⚖️ 표준국가법령 (RP)", "subtitle": "공통 실무법 동기화", "content": "<p>※ 서울특별시는 대한민국의 <b>표준국가법령체계(형법, 도로교통법 등)</b>를 100% 동일하게 적용합니다.</p>" }
            ]
          },
          "geumsan": {
            "name": "금산군 (동맹)",
            "desc": "자매결연 지자체로, 자체적인 자치 규정과 개별 도시 법령을 적용합니다.",
            "laws": [
              { "title": "🔰 금산군 자치규정", "subtitle": "자체 지자체 규정", "content": "<p><b>제1조</b> 금산군 커뮤니티의 운영과 소통을 위한 자치 규칙이다.</p>" },
              { "title": "🌾 개별도시법령 (RP)", "subtitle": "금산군 자치조례", "content": "<p><b>[금산군 조례 제1조]</b> 금산군 내에서 행해지는 독자적 RP 활동 규정이다.</p>" }
            ]
          },
          "bucheon": {
            "name": "부천시 오정구 (동맹)",
            "desc": "자매결연 지자체로, 자체적인 자치 규정과 개별 도시 법령을 적용합니다.",
            "laws": [
              { "title": "🔰 오정구 자치규정", "subtitle": "자체 지자체 규정", "content": "<p><b>제1조</b> 부천시 오정구의 원활한 운영을 위한 규칙이다.</p>" },
              { "title": "🏙️ 개별도시법령 (RP)", "subtitle": "부천시 조례", "content": "<p><b>[부천시 조례 제1조]</b> 오정구 관할 지역에 적용되는 독자적 조례이다.</p>" }
            ]
          }
        };

        function init() {
            renderTabs();
            switchCity('hq');
        }

        function renderTabs() {
            const container = document.getElementById('tab-container');
            container.innerHTML = '';
            Object.keys(lawData).forEach(key => {
                const city = lawData[key];
                const button = document.createElement('button');
                button.id = `tab-${key}`;
                button.className = "py-3 px-4 rounded-xl font-bold text-sm border transition shadow-sm text-center bg-gray-800 border-gray-700 text-gray-300 hover:bg-gray-700";
                button.innerText = city.name;
                button.onclick = () => switchCity(key);
                container.appendChild(button);
            });
        }

        function switchCity(cityKey) {
            Object.keys(lawData).forEach(key => {
                const btn = document.getElementById(`tab-${key}`);
                if (btn) btn.className = "py-3 px-4 rounded-xl font-bold text-sm border transition shadow-sm text-center bg-gray-800 border-gray-700 text-gray-300 hover:bg-gray-700";
            });
            const activeBtn = document.getElementById(`tab-${cityKey}`);
            if (activeBtn) activeBtn.className = "py-3 px-4 rounded-xl font-bold text-sm border transition shadow-sm text-center bg-blue-600 border-blue-500 text-white";

            const city = lawData[cityKey];
            document.getElementById('city-title').innerText = city.name;
            document.getElementById('city-desc').innerText = city.desc;

            const lawsContainer = document.getElementById('laws-container');
            lawsContainer.innerHTML = '';
            city.laws.forEach((law, index) => {
                const lawCard = document.createElement('div');
                lawCard.className = "bg-gray-800 border border-gray-700 rounded-xl overflow-hidden shadow-sm";
                lawCard.innerHTML = `
                    <button class="w-full text-left p-4 flex justify-between items-center hover:bg-gray-750 focus:outline-none" onclick="toggleAccordion(${index})">
                        <div>
                            <span class="font-bold text-white text-base block">${law.title}</span>
                            <span class="text-xs text-gray-400">${law.subtitle}</span>
                        </div>
                        <span class="text-gray-500 font-bold transition-transform duration-300" id="arrow-${index}">▼</span>
                    </button>
                    <div class="accordion-content max-h-0 bg-gray-850 border-t border-gray-750" id="content-${index}">
                        <div class="p-4 text-sm text-gray-300 leading-relaxed space-y-3">${law.content}</div>
                    </div>
                `;
                lawsContainer.appendChild(lawCard);
            });
        }

        function toggleAccordion(index) {
            const content = document.getElementById(`content-${index}`);
            const arrow = document.getElementById(`arrow-${index}`);
            if (content.style.maxHeight && content.style.maxHeight !== '0px') {
                content.style.maxHeight = '0px';
                arrow.style.transform = 'rotate(0deg)';
            } else {
                content.style.maxHeight = content.scrollHeight + 'px';
                arrow.style.transform = 'rotate(180deg)';
            }
        }

        window.onload = init;
    </script>
</body>
</html>
